<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QuizHub — Проверь свои знания!</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F0E17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QuizHub">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="css/core/style.css" rel="stylesheet">
    <link href="css/core/themes.css" rel="stylesheet">
    <link href="css/core/performance.css" rel="stylesheet">
    <link href="css/components/chat.css" rel="stylesheet">
    <link href="css/components/social.css" rel="stylesheet">
    <link href="css/components/events.css" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <div class="particles" id="particles"></div>
        
        <header class="app-header">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center py-3">
                    <a href="#" class="logo parallax-layer" data-speed="0.3" onclick="showScreen('home'); return false;">
                        <i class="bi bi-lightning-charge-fill me-2"></i>Quiz<span class="text-accent">Hub</span>
                    </a>
                    
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Меню"><i class="bi bi-list"></i></button>
                    
                    <div class="header-actions-collapsible" id="header-actions">
                        <button type="button" class="btn btn-locale btn-sm rounded-pill px-2 active" data-locale="ru">🇷🇺</button>
                        <button type="button" class="btn btn-locale btn-sm rounded-pill px-2" data-locale="en">🇬🇧</button>
                        
                        <div class="theme-toggle-wrapper me-1">
                            <div class="theme-toggle-btn" id="theme-toggle-btn" onclick="toggleTheme()">
                                <div class="stars-container"><span class="star"></span><span class="star"></span><span class="star"></span><span class="star"></span><span class="star"></span><span class="star"></span><span class="star"></span></div>
                                <div class="clouds-container"><div class="cloud cloud-1"></div><div class="cloud cloud-2"></div></div>
                            </div>
                        </div>
                        
                        <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-3" onclick="showScreen('leaderboard')"><i class="bi bi-trophy me-1"></i><span class="d-none d-md-inline">Лидеры</span></button>
                        <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-3" onclick="showScreen('achievements')"><i class="bi bi-award me-1"></i><span class="d-none d-md-inline">Ачивки</span></button>
                        <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-3" onclick="showScreen('stats')"><i class="bi bi-graph-up me-1"></i><span class="d-none d-md-inline">Статистика</span></button>
                        <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-3" onclick="showFriendsScreen()"><i class="bi bi-people-fill me-1"></i><span class="d-none d-md-inline">Друзья</span></button>
                        <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-2" onclick="showShopScreen()" title="Магазин">🪙<span id="coins-display">0</span></button>
                        <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-2" id="sound-toggle" onclick="toggleSound()" title="Звук"><i class="bi bi-volume-up-fill"></i></button>
                        <div id="auth-area"><button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-3" onclick="signInWithGoogle()"><i class="bi bi-google me-2"></i>Войти</button></div>
                    </div>
                </div>
            </div>
        </header>
        
        <main class="app-main">
            <div class="container">
                
                <div class="screen active" id="screen-home">
                    <div class="row justify-content-center"><div class="col-lg-6 text-center">
                        <div class="hero-icon mb-4 parallax-layer" data-speed="0.5">🧠</div>
                        <h1 class="display-3 fw-bold font-display mb-3">Проверь свои <span class="text-accent">знания</span></h1>
                        <p class="lead mb-5">Выбери категорию, пройди квиз и займи место в таблице лидеров!</p>
                        
                        <div class="quiz-setup bg-card rounded-4 p-4 p-md-5 mb-4">
                            <div class="mb-4 text-start">
                                <label class="form-label small fw-semibold text-muted"><i class="bi bi-person me-1 text-accent"></i>Твоё имя</label>
                                <input type="text" class="form-control form-control-lg rounded-pill px-4" id="player-name" placeholder="Владислав" maxlength="20" autocomplete="off">
                            </div>
                            <div class="mb-4 text-start">
                                <label class="form-label small fw-semibold text-muted"><i class="bi bi-grid me-1 text-accent"></i>Категория</label>
                                <select class="form-select form-select-lg rounded-pill px-4" id="quiz-category">
                                    <option value="any">Любая категория</option>
                                    <option value="science">🔬 Наука</option><option value="history">📜 История</option>
                                    <option value="geography">🌍 География</option><option value="sport">⚽ Спорт</option>
                                    <option value="cinema">🎬 Кино и искусство</option><option value="music">🎵 Музыка</option>
                                    <option value="it">💻 IT и технологии</option><option value="literature">📚 Литература</option>
                                    <option value="food">🍔 Еда</option><option value="animals">🐾 Животные</option>
                                    <option value="space">🚀 Космос</option>
                                </select>
                            </div>
                            <div class="mb-4 text-start">
                                <label class="form-label small fw-semibold text-muted"><i class="bi bi-speedometer2 me-1 text-accent"></i>Сложность</label>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-difficulty active rounded-pill px-4" data-difficulty="easy">🟢 Легко</button>
                                    <button class="btn btn-difficulty rounded-pill px-4" data-difficulty="medium">🟡 Средне</button>
                                    <button class="btn btn-difficulty rounded-pill px-4" data-difficulty="hard">🔴 Сложно</button>
                                </div>
                            </div>
                            <button class="btn btn-accent btn-lg rounded-pill px-5 w-100 shadow-lg" id="start-quiz"><i class="bi bi-play-fill me-2"></i>НАЧАТЬ КВИЗ</button>
                        </div>
                        
                        <div class="d-flex flex-wrap gap-2 justify-content-center mb-4">
                            <button class="btn btn-outline-accent rounded-pill px-4" onclick="startSurvivalMode()">💀 Выживание</button>
                            <button class="btn btn-outline-accent rounded-pill px-4" onclick="showAISelectScreen()">🤖 vs AI</button>
                            <button class="btn btn-outline-accent rounded-pill px-4" onclick="startTimedMode()">⏱ На время</button>
                            <button class="btn btn-outline-accent rounded-pill px-4" onclick="showTournamentScreen()">🏆 Турниры</button>
                            <button class="btn btn-outline-accent rounded-pill px-4" onclick="showTeamScreen()">👥 Команда</button>
                        </div>
                        
                        <div class="d-flex justify-content-center gap-4 text-muted small flex-wrap">
                            <span>📝 10 вопросов</span><span>⏰ 15 сек / вопрос</span><span>⭐ Бонусы за скорость</span>
                        </div>
                    </div></div>
                </div>
                
                <div class="screen" id="screen-quiz"></div>
                <div class="screen" id="screen-result"></div>
                <div class="screen" id="screen-leaderboard"></div>
                <div class="screen" id="screen-achievements"></div>
                <div class="screen" id="screen-stats"></div>
                <div class="screen" id="screen-team"></div>
                <div class="screen" id="screen-tournament"></div>
                <div class="screen" id="screen-shop"></div>
                <div class="screen" id="screen-friends"></div>
            </div>
        </main>
        
        <footer class="app-footer"><div class="container text-center py-3"><small class="text-muted">© 2026 QuizHub • <span class="live-dot"></span> Real-time</small></div></footer>
    </div>
    
    <div id="achievements-popup" style="display:none;position:fixed;top:100px;right:20px;z-index:9999;max-width:320px;"></div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/core/firebase-config.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/services/sounds.js"></script>
    <script src="js/services/animations.js"></script>
    <script src="js/services/offline.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/social/auth.js"></script>
    <script src="js/social/social.js"></script>
    <script src="js/social/teams.js"></script>
    <script src="js/social/tournaments.js"></script>
    <script src="js/social/chat.js"></script>
    <script src="js/social/events.js"></script>
    <script src="js/features/achievements.js"></script>
    <script src="js/features/quests.js"></script>
    <script src="js/features/coins.js"></script>
    <script src="js/features/survival.js"></script>
    <script src="js/features/ai.js"></script>
    <script src="js/features/duel.js"></script>
    <script src="js/features/stats.js"></script>
    <script src="js/features/voice.js"></script>
    <script src="js/features/swipe.js"></script>
    <script src="js/services/firestore-sync.js"></script>
    <script src="js/utils/performance.js"></script>
    <script src="js/utils/bundle-optimizer.js"></script>
    <script src="js/utils/security.js"></script>
    <script src="js/core/ui.js"></script>
    <script src="js/core/quiz.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/QuizHub/sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW failed:', err));
            });
        }
    </script>
</body>
</html>
