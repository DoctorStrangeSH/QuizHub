<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QuizHub — Проверь свои знания!</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F0E17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QuizHub">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Кастомные стили -->
    <link href="css/style.css" rel="stylesheet">
    <link href="css/themes.css" rel="stylesheet">
</head>
<body>

    <!-- ОСНОВНОЙ КОНТЕЙНЕР -->
    <div class="app-container">
        
        <!-- Частицы фона -->
        <div class="particles" id="particles"></div>
        
       <!-- ХЕДЕР -->
<header class="app-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center py-3">
            <a href="#" class="logo parallax-layer" data-speed="0.3" onclick="showScreen('home'); return false;">
                <i class="bi bi-lightning-charge-fill me-2"></i>Quiz<span class="text-accent">Hub</span>
            </a>
            
            <!-- Мобильная кнопка меню -->
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Меню">
                <i class="bi bi-list"></i>
            </button>
            
            <!-- Действия -->
            <div class="header-actions-collapsible" id="header-actions">
                
                <!-- Переключатель темы -->
                <div class="theme-toggle-wrapper me-1">
                    <div class="theme-toggle-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Переключить тему">
                        <!-- Звёзды -->
                        <div class="stars-container">
                            <span class="star"></span>
                            <span class="star"></span>
                            <span class="star"></span>
                            <span class="star"></span>
                            <span class="star"></span>
                            <span class="star"></span>
                            <span class="star"></span>
                        </div>
                        <!-- Облака -->
                        <div class="clouds-container">
                            <div class="cloud cloud-1"></div>
                            <div class="cloud cloud-2"></div>
                        </div>
                    </div>
                </div>
                
                <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-3" 
                        onclick="showScreen('leaderboard')">
                    <i class="bi bi-trophy me-1"></i><span class="d-none d-md-inline">Лидеры</span>
                </button>
                <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-3" 
                        onclick="showScreen('achievements')">
                    <i class="bi bi-award me-1"></i><span class="d-none d-md-inline">Ачивки</span>
                </button>
                <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-3" 
                        onclick="showScreen('stats')">
                    <i class="bi bi-graph-up me-1"></i><span class="d-none d-md-inline">Статистика</span>
                </button>
                <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-2" 
                        id="sound-toggle" onclick="toggleSound()" title="Звук">
                    <i class="bi bi-volume-up-fill"></i>
                </button>
                <div id="auth-area">
                    <button type="button" class="btn btn-outline-accent btn-sm rounded-pill px-3" 
                            onclick="signInWithGoogle()">
                        <i class="bi bi-google me-2"></i>Войти
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>
        
        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="app-main">
            <div class="container">
                
                <!-- ЭКРАН 1: ГЛАВНАЯ -->
                <div class="screen active" id="screen-home">
                    <div class="row justify-content-center">
                        <div class="col-lg-6 text-center">
                            
                            <div class="hero-icon mb-4 parallax-layer" data-speed="0.5">🧠</div>
                            
                            <h1 class="display-3 fw-bold font-display mb-3">
                                Проверь свои <span class="text-accent">знания</span>
                            </h1>
                            <p class="lead mb-5" style="color: #C0C0D0;">
                                Выбери категорию, пройди квиз и займи место в таблице лидеров!
                            </p>
                            
                            <!-- Форма настроек квиза -->
                            <div class="quiz-setup bg-card rounded-4 p-4 p-md-5 mb-4">
                                
                                <!-- Имя -->
                                <div class="mb-4 text-start">
                                    <label class="form-label small fw-semibold text-muted">
                                        <i class="bi bi-person me-1 text-accent"></i>Твоё имя
                                    </label>
                                    <input type="text" class="form-control form-control-lg rounded-pill px-4" 
                                           id="player-name" placeholder="Владислав" maxlength="20" autocomplete="off">
                                </div>
                                
                                <!-- Категория -->
                                <div class="mb-4 text-start">
                                    <label class="form-label small fw-semibold text-muted">
                                        <i class="bi bi-grid me-1 text-accent"></i>Категория
                                    </label>
                                    <select class="form-select form-select-lg rounded-pill px-4" id="quiz-category">
                                        <option value="any">Любая категория</option>
                                        <option value="9">Общие знания</option>
                                        <option value="17">Наука и природа</option>
                                        <option value="21">Спорт</option>
                                        <option value="23">История</option>
                                        <option value="11">Кино</option>
                                        <option value="14">Телевидение</option>
                                        <option value="12">Музыка</option>
                                        <option value="15">Видеоигры</option>
                                        <option value="18">Компьютеры</option>
                                        <option value="22">География</option>
                                    </select>
                                </div>
                                
                                <!-- Сложность -->
                                <div class="mb-4 text-start">
                                    <label class="form-label small fw-semibold text-muted">
                                        <i class="bi bi-speedometer2 me-1 text-accent"></i>Сложность
                                    </label>
                                    <div class="d-flex gap-2">
                                        <button type="button" class="btn btn-difficulty active rounded-pill px-4" data-difficulty="easy">
                                            🟢 Легко
                                        </button>
                                        <button type="button" class="btn btn-difficulty rounded-pill px-4" data-difficulty="medium">
                                            🟡 Средне
                                        </button>
                                        <button type="button" class="btn btn-difficulty rounded-pill px-4" data-difficulty="hard">
                                            🔴 Сложно
                                        </button>
                                    </div>
                                </div>
                                
                                <!-- Язык -->
                                <div class="mb-4 text-start">
                                    <label class="form-label small fw-semibold text-muted">
                                        <i class="bi bi-translate me-1 text-accent"></i>Язык вопросов
                                    </label>
                                    <div class="d-flex gap-2">
                                        <button type="button" class="btn btn-language active rounded-pill px-4" data-lang="ru">
                                            🇷🇺 Русский
                                        </button>
                                        <button type="button" class="btn btn-language rounded-pill px-4" data-lang="en">
                                            🇬🇧 English
                                        </button>
                                    </div>
                                </div>
                                
                                <!-- Кнопка старта -->
                                <button type="button" class="btn btn-accent btn-lg rounded-pill px-5 w-100 shadow-lg" id="start-quiz">
                                    <i class="bi bi-play-fill me-2"></i>НАЧАТЬ КВИЗ
                                </button>
                                
                            </div>
                            
                            <!-- Режимы игры -->
                            <div class="d-flex flex-wrap gap-2 justify-content-center mb-4">
                                <button type="button" class="btn btn-outline-accent rounded-pill px-4" onclick="createDuelRoom()" data-tooltip="Игра против друга">
                                    <i class="bi bi-controller me-2"></i>Дуэль
                                </button>
                                <button type="button" class="btn btn-outline-accent rounded-pill px-4" onclick="showJoinDuelForm()" data-tooltip="Присоединиться по коду">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Код
                                </button>
                                <button type="button" class="btn btn-outline-accent rounded-pill px-4" onclick="startTimedMode()" data-tooltip="60 секунд на рекорд">
                                    <i class="bi bi-stopwatch me-2"></i>На время
                                </button>
                            </div>
                            
                            <!-- Мини-статистика -->
                            <div class="d-flex justify-content-center gap-4 text-muted small flex-wrap">
                                <span><i class="bi bi-question-circle me-1 text-accent"></i>10 вопросов</span>
                                <span><i class="bi bi-clock me-1 text-accent"></i>15 сек / вопрос</span>
                                <span><i class="bi bi-trophy me-1 text-accent"></i>Бонусы за скорость</span>
                            </div>
                            
                        </div>
                    </div>
                </div>
                
                <!-- ЭКРАН 2: КВИЗ -->
                <div class="screen" id="screen-quiz"></div>
                
                <!-- ЭКРАН 3: РЕЗУЛЬТАТ -->
                <div class="screen" id="screen-result"></div>
                
                <!-- ЭКРАН 4: ТАБЛИЦА ЛИДЕРОВ -->
                <div class="screen" id="screen-leaderboard"></div>
                
                <!-- ЭКРАН 5: АЧИВКИ -->
                <div class="screen" id="screen-achievements"></div>
                
                <!-- ЭКРАН 6: СТАТИСТИКА -->
                <div class="screen" id="screen-stats"></div>
                
            </div>
        </main>
        
        <!-- ФУТЕР -->
        <footer class="app-footer">
            <div class="container text-center py-3">
                <small class="text-muted">
                    © 2026 QuizHub. Вопросы предоставлены 
                    <a href="https://opentdb.com" target="_blank" class="text-accent text-decoration-none">Open Trivia DB</a>
                    • <span class="live-dot"></span> Real-time
                </small>
            </div>
        </footer>
        
    </div>
    
    <!-- Попап достижений -->
    <div id="achievements-popup" style="display: none; position: fixed; top: 100px; right: 20px; z-index: 9999; max-width: 320px;"></div>
    
    <!-- Тост-контейнер -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Скрипты QuizHub -->
    <script src="js/firebase-config.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/duel.js"></script>
    <script src="js/achievements.js"></script>
    
    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/QuizHub/sw.js')
                    .then(reg => {
                        console.log('SW registered:', reg.scope);
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    showToast('Доступна новая версия! Обновите страницу 🔄', 'info');
                                }
                            });
                        });
                    })
                    .catch(err => console.log('SW failed:', err));
            });
            
            navigator.serviceWorker.ready.then(reg => {
                if ('sync' in reg) console.log('[PWA] Background Sync поддерживается');
                if ('periodicSync' in reg) console.log('[PWA] Periodic Sync поддерживается');
            });
        }
    </script>
</body>
</html>
